name: Release

# Builds and publishes the signed desktop client when a version tag is pushed.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Produces, on a single GitHub Release:
#   - signed bundles for macOS (Intel + Apple Silicon), Windows (x86_64 + ARM64),
#     and Linux (x86_64 + aarch64, AppImage)
#   - the `.sig` files and a `latest.json` manifest the in-app updater reads
#
# Structure: one `create-release` job makes a single fresh draft release and
# outputs its id; the build matrix runs fully in parallel and each job uploads
# its own uniquely-named bundles and `.sig` files into that release by id.
# Because each job only touches its own assets, the jobs cannot race. A final
# `updater-json` job then assembles `latest.json` once from the uploaded `.sig`
# files. (Letting every build job write `latest.json` itself — the old
# includeUpdaterJson path — was a read-modify-write on one shared asset and is
# why the matrix used to run serially.)
#
# The release is created as a DRAFT; auto-update goes live once you publish it.
# The updater URLs use releases/latest/download/, which only resolves once the
# draft is published, so the new latest.json goes live exactly when you publish.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           contents of the minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key's password
#
# ARM targets build on GitHub's native ARM runners (free for public repos).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# arduino/setup-protoc has no Node 24 release yet. Force every JS action onto
# Node 24 (the runner default from June 16, 2026) so the runtime switch happens
# on our terms instead of breaking a release build when the default flips.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.mk.outputs.result }}
    steps:
      - name: Create a fresh draft release
        id: mk
        uses: actions/github-script@v9
        env:
          TAG: ${{ github.ref_name }}
        with:
          script: |
            const tag = process.env.TAG;
            const { owner, repo } = context.repo;
            // Delete any existing release for this tag so we always start from a
            // clean slate (no leftover assets for jobs to race on).
            const list = await github.rest.repos.listReleases({ owner, repo, per_page: 100 });
            for (const r of list.data) {
              if (r.tag_name === tag) {
                await github.rest.repos.deleteRelease({ owner, repo, release_id: r.id });
              }
            }
            const body = [
              "See the assets below to download and install Axeno.",
              "",
              "- **macOS**: `.dmg` (Apple Silicon or Intel)",
              "- **Windows**: `-setup.exe` (x64 or ARM64)",
              "- **Linux**: `.AppImage` (x86_64 or aarch64; requires FUSE / `libfuse2`)",
              "",
              "### macOS: first launch",
              "",
              "The app is not notarized by Apple. After opening the `.dmg` and dragging Axeno to your Applications folder, macOS will block the first launch with a security warning. To open it:",
              "",
              "**Option A — System Settings:** Open **System Settings → Privacy & Security**, scroll to the bottom, and click **Open Anyway** next to the Axeno message.",
              "",
              "**Option B — Finder:** Right-click **Axeno.app** in your Applications folder, choose **Open**, then click **Open** in the dialog that appears.",
              "",
              "**Option C — Terminal:**",
              "```",
              "xattr -cr /Applications/Axeno.app",
              "```",
              "",
              "You only need to do this once.",
            ].join("\n");
            const res = await github.rest.repos.createRelease({
              owner, repo, tag_name: tag,
              name: `Axeno ${tag}`,
              body,
              draft: true, prerelease: false,
            });
            return res.data.id;

  build:
    name: ${{ matrix.name }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64 (AppImage)
            slug: linux-x86_64
            platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - name: Linux Arm64 (AppImage)
            slug: linux-aarch64
            platform: ubuntu-22.04-arm
            args: ""
            rust-targets: ""
          - name: Macos Intel
            slug: macos-x86_64
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - name: Macos Arm
            slug: macos-aarch64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - name: Windows x64 (exe)
            slug: windows-x86_64
            platform: windows-latest
            args: ""
            rust-targets: ""
          - name: Windows Arm64 (exe)
            slug: windows-aarch64
            platform: windows-11-arm
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            pkg-config \
            xdg-utils

      # libsignal's spqr crate compiles .proto files with prost-build, which shells
      # out to `protoc`. Install it through the maintained, token-authenticated
      # action on every platform that has a native protoc release. This replaces
      # the manual GitHub-release download whose CDN 504'd; the token also avoids
      # anonymous API rate limits. It covers Linux x64/arm64, macOS x64/arm64, and
      # Windows x64.
      - name: Install protoc
        if: matrix.slug != 'windows-aarch64'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # protobuf publishes no native Windows/ARM64 build, so the ARM runner uses the
      # x64 protoc under emulation. Kept as a small retrying manual download.
      - name: Install protoc (Windows ARM, emulated x64)
        if: matrix.slug == 'windows-aarch64'
        shell: pwsh
        run: |
          $ver = "28.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$ver/protoc-$ver-win64.zip"
          $dest = "$env:RUNNER_TEMP\protoc.zip"
          for ($i = 1; $i -le 5; $i++) {
            try { Invoke-WebRequest -Uri $url -OutFile $dest; break }
            catch {
              if ($i -eq 5) { throw }
              Write-Host "protoc download failed (attempt $i): $($_.Exception.Message) - retrying in 10s"
              Start-Sleep -Seconds 10
            }
          }
          Expand-Archive $dest -DestinationPath "$env:RUNNER_TEMP\protoc" -Force
          "$env:RUNNER_TEMP\protoc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # The AppImage bundler downloads linuxdeploy/AppRun from GitHub's release CDN
      # at bundle time, which intermittently returns 504. That download lives inside
      # tauri-action and can't be retried in place, so the whole build step is run
      # with one automatic retry: the first attempt is allowed to fail, and on
      # failure a second attempt runs after a short backoff. Cargo output is cached
      # between attempts, so the retry only re-runs bundling/upload, not the compile.
      - name: Build, sign, and upload to the release (attempt 1)
        id: build1
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # linuxdeploy ships as an AppImage and needs FUSE to mount itself, which
          # GitHub runners lack. Extract-and-run avoids FUSE so AppImage bundling
          # works. No-op on macOS/Windows.
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # latest.json is assembled once by the updater-json job; if each
          # parallel build wrote it here they would clobber each other.
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Back off before retry
        if: steps.build1.outcome == 'failure'
        shell: bash
        run: sleep 45

      - name: Build, sign, and upload to the release (retry)
        if: steps.build1.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

  updater-json:
    name: Assemble latest.json
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Pull the per-platform updater signatures the build matrix uploaded. The
      # release is still a draft, so this needs the token to see it.
      - name: Download signatures from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p sigs
          gh release download "$TAG" -R "$REPO" --pattern '*.sig' --dir sigs
          echo "Downloaded signatures:"; ls -1 sigs

      # Build latest.json from the signatures. Each updater artifact (e.g.
      # Axeno_x64.app.tar.gz) has a sibling .sig; the artifact name maps to a
      # Tauri updater platform key. The URLs use releases/latest/download/ so
      # they resolve to whichever release is published. The script fails if any
      # expected platform is missing, so a partial release never ships a
      # latest.json that silently breaks auto-update for some users.
      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const repo = process.env.REPO;
          const tag = process.env.TAG;
          const version = tag.replace(/^v/, "");
          const base = `https://github.com/${repo}/releases/latest/download`;

          // Map a signed updater artifact filename to its Tauri updater platform
          // key(s). tauri-action names these uniquely per arch, so there is no
          // collision across the matrix.
          const keysFor = (file) => {
            if (file.endsWith("_x64.app.tar.gz"))     return ["darwin-x86_64"];
            if (file.endsWith("_aarch64.app.tar.gz")) return ["darwin-aarch64"];
            if (file.endsWith("_amd64.AppImage"))     return ["linux-x86_64", "linux-x86_64-appimage"];
            if (file.endsWith("_aarch64.AppImage"))   return ["linux-aarch64", "linux-aarch64-appimage"];
            if (file.endsWith("_x64-setup.exe"))      return ["windows-x86_64"];
            if (file.endsWith("_arm64-setup.exe"))    return ["windows-aarch64"];
            return [];
          };

          const platforms = {};
          for (const sig of fs.readdirSync("sigs").filter((f) => f.endsWith(".sig"))) {
            const artifact = sig.replace(/\.sig$/, "");
            const keys = keysFor(artifact);
            if (keys.length === 0) continue;
            const signature = fs.readFileSync(path.join("sigs", sig), "utf8").trim();
            for (const k of keys) platforms[k] = { signature, url: `${base}/${artifact}` };
          }

          const expected = [
            "darwin-x86_64", "darwin-aarch64",
            "linux-x86_64", "linux-aarch64",
            "windows-x86_64", "windows-aarch64",
          ];
          const missing = expected.filter((k) => !platforms[k]);
          if (missing.length) {
            console.error(`::error::latest.json is missing platforms: ${missing.join(", ")}`);
            process.exit(1);
          }

          const out = { version, notes: "", pub_date: new Date().toISOString(), platforms };
          fs.writeFileSync("latest.json", JSON.stringify(out, null, 2) + "\n");
          console.log(JSON.stringify(out, null, 2));
          NODE

      - name: Upload latest.json to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release upload "$TAG" -R "$REPO" latest.json --clobber
